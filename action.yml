name: 'OpenSpec Accessibility Audit'
description: 'Gate your deployments by failing CI if WCAG violations are found.'
author: 'codev-aryan'
branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  target:
    description: 'File path (relative to repo root) or URL to audit'
    required: true
    default: 'index.html'
  groq_api_key:
    description: 'Your Groq API Key for Llama 3 fixes'
    required: true
  max:
    description: 'Maximum number of violations to process'
    required: false
    default: '5'

runs:
  using: 'composite'
  steps:
    - name: Install OpenSpec Dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm install

    - name: Run OpenSpec Audit
      shell: bash
      # Runs your CLI against the user's code, strictly enforcing accessibility
      run: node ${{ github.action_path }}/index.js ${{ inputs.target }} --strict --max ${{ inputs.max }}
      env:
        GROQ_API_KEY: ${{ inputs.groq_api_key }}
