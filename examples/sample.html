<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>OpenSpec Sample Page</title>
    <style>
      body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }

      /* VIOLATION 6: color-contrast — light grey text on white background fails WCAG AA */
      .disclaimer { color: #aaaaaa; background: #ffffff; font-size: 14px; }
    </style>
  </head>
  <body>

    <!-- VIOLATION 1: image-alt — <img> with no alt attribute -->
    <img src="hero.png" />

    <!-- valid heading to start -->
    <h1>Welcome to our site</h1>

    <!-- VIOLATION 2: heading-order — jumps from h1 straight to h4, skipping h2 and h3 -->
    <h4>Our Features</h4>
    <p>We build great things for great people.</p>

    <!-- VIOLATION 3: label — input has no associated <label> or aria-label -->
    <form>
      <input type="email" placeholder="Enter your email" />
      <button type="submit">Subscribe</button>
    </form>

    <!-- VIOLATION 4: button-name — button contains only an icon character, no accessible label -->
    <button>🔍</button>

    <!-- VIOLATION 5: link-name — anchor text gives no description of the destination -->
    <p>
      To learn more about accessibility guidelines, please
      <a href="https://www.w3.org/WAI/WCAG21/quickref/">click here</a>.
    </p>

    <!-- VIOLATION 6: color-contrast — text color #aaaaaa on white fails AA contrast ratio -->
    <p class="disclaimer">
      This site is for demonstration purposes only. Content may not be accurate.
    </p>

  </body>
</html>
