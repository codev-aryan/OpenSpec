<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>OpenSpec Sample Page</title>
    <style>
      body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
    </style>
  </head>
  <body>

    <!-- VIOLATION 1: image-alt — <img> with no alt attribute -->
    <img src="hero.png">

    <!-- valid heading to start -->
    <h1>Welcome to our site</h1>

    <!-- VIOLATION 2: heading-order — jumps from h1 straight to h4, skipping h2 and h3 -->
    <h4>Our Features</h4>
    <p>We build great things for great people.</p>

    <!-- VIOLATION 3: html-has-lang — <html> tag has no lang attribute -->
    <!-- (see the opening <html> tag above) -->

    <form>
      <input type="email" placeholder="Enter your email" />
      <button type="submit">Subscribe</button>
    </form>

    <button>🔍</button>

    <p>
      To learn more about accessibility guidelines, please
      <a href="https://www.w3.org/WAI/WCAG21/quickref/">click here</a>.
    </p>

    <!-- VIOLATION 4: region — page content not wrapped in a landmark region -->
    <p>
      This site is for demonstration purposes only. Content may not be accurate.
    </p>

  </body>
</html>
